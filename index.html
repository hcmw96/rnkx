<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <title>RNKX</title>
    <style>
      #apple-auth-boot {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: #000;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      #apple-auth-boot[data-active='true'] {
        display: flex;
      }
      #apple-auth-boot p {
        margin: 0;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.8);
      }
    </style>
  </head>
  <body style="margin: 0; background-color: #000">
    <div id="apple-auth-boot" aria-live="polite" aria-busy="true">
      <p>Signing you in with Apple…</p>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        if (window.location.pathname === '/auth/apple/complete') {
          var boot = document.getElementById('apple-auth-boot');
          if (boot) boot.setAttribute('data-active', 'true');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
